            <li><a href="cv.html" class="nav__cta">CV</a></li>
        </ul>
    </nav>
</header>
<main class="site-main">
<section class="contact">
    <h1>Contact</h1>
    <p class="contact__reply-time">I usually reply within 24-48 hours.</p>
    <p id="sent" class="contact__sent">Thank you. Your message has been sent successfully.</p>
    <form action="https://formsubmit.co/larisaeb0289@gmail.com" method="POST" class="contact__form">
        <input type="hidden" name="_subject" value="New portfolio contact message">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="text" name="_honey" class="visually-hidden" tabindex="-1" autocomplete="off">
        <input type="hidden" name="_next" id="contact-next" value="">
        <label>Name<input type="text" name="name" required></label>
        <label>Email<input type="email" name="email" required></label>
        <label>Message<textarea name="message" rows="5" required></textarea></label>
        <button type="submit">Send message</button>
    </form>
    <script>
        (function () {
            var nextInput = document.getElementById("contact-next");
            if (!nextInput) return;
            nextInput.value = window.location.origin + window.location.pathname + "#sent";
            if (window.location.hash === "#sent") {
                window.setTimeout(function () {
                    history.replaceState(null, "", window.location.pathname);
                }, 5000);
            }
        })();
    </script>
</section>
</main>
